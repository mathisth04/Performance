<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Library 7a</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #000000; 
            --card: #1C1C1E; 
            --climb: #BF5AF2; /* Violet */
            --flex: #34C759;  /* Vert Émeraude */
            --jump: #0A84FF;  /* Bleu */
        }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        
        .tab-btn { transition: all 0.3s; border-bottom: 2px solid transparent; opacity: 0.3; }
        .tab-btn.active { opacity: 1; border-color: currentColor; transform: scale(1.05); }

        .exercise-card { background: var(--card); border: 0.5px solid #2C2C2E; border-radius: 18px; transition: transform 0.2s active; }
        .exercise-card:active { transform: scale(0.96); background: #2C2C2E; }

        .notice-box { background: rgba(255, 255, 255, 0.03); border-radius: 14px; padding: 12px; border: 0.5px dashed rgba(255,255,255,0.1); }

        #modal { backdrop-filter: blur(25px); transition: all 0.4s ease-in-out; }
        .modal-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-open .modal-content { transform: translateY(0); }
        
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="overflow-hidden">

    <header class="p-6 pb-2 sticky top-0 bg-black/80 backdrop-blur-md z-40">
        <h1 class="text-2xl font-black uppercase tracking-tighter italic mb-4">Library <span class="text-blue-500">7a</span></h1>
        <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest px-2">
            <button onclick="switchTab('climb')" id="tab-climb" class="tab-btn active text-purple-400">Escalade</button>
            <button onclick="switchTab('flex')" id="tab-flex" class="tab-btn text-green-500">Souplesse</button>
            <button onclick="switchTab('jump')" id="tab-jump" class="tab-btn text-blue-500">Détente</button>
        </div>
    </header>

    <main id="content" class="px-5 pt-4 h-[calc(100vh-140px)] overflow-y-auto pb-24">
        </main>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-end">
        <div onclick="closeModal()" class="absolute inset-0 bg-black/70"></div>
        <div class="modal-content w-full bg-[#1C1C1E] rounded-t-[32px] p-8 border-t border-white/10 safe-bottom">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6"></div>
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 bg-white/10 rounded-2xl font-bold uppercase text-[10px] tracking-widest">Fermer</button>
        </div>
    </div>

    <script>
        const notices = {
            climb: {
                when: "Avant séance (Échauffement) ou jours de repos (Doigts).",
                avoid: "Ne pas faire le Mini-Crux juste avant un projet maximal."
            },
            flex: {
                when: "Soir au calme (Récup) ou micro-pauses au bureau.",
                avoid: "Éviter les étirements longs (>30s) juste avant un match de volley."
            },
            jump: {
                when: "3x par semaine. Idéalement les jours sans volley.",
                avoid: "Le jour d'un match important (fatigue nerveuse)."
            }
        };

        const exercises = {
            climb: [
                { name: "Mini Crux (No-Hang)", detail: "Tirage à une main sur réglette 20mm. Épaule verrouillée, buste fier.", routine: "5 séries de 7s (90% effort) / main.", note: "Le secret pour passer du 6c au 7a.", color: "var(--climb)" },
                { name: "Hangboard (Soft)", detail: "Suspensions bras tendus. Focus sur la sensation de poulie.", routine: "3-5 suspensions de 10s.", note: "Activation nerveuse avant grimpe.", color: "var(--climb)" },
                { name: "Tractions Lestées", detail: "Haltère ou disque. Mouvement strict sans balancement.", routine: "4 séries de 5 reps.", note: "Puissance de tirage brute.", color: "var(--climb)" }
            ],
            flex: [
                { name: "Couch Stretch", detail: "Genou contre mur, redresse le buste. Contracte la fesse.", routine: "2 min par jambe.", note: "Le 'tueur' de douleur de genou.", color: "var(--flex)" },
                { name: "La Grenouille", detail: "Hanches ouvertes, bascule vers l'arrière.", routine: "3 minutes au calme.", note: "Pour les carres internes hautes.", color: "var(--flex)" },
                { name: "Le Pigeon", detail: "Une jambe pliée devant. Garde le bassin face au sol.", routine: "2 min par jambe.", note: "Récupération fessiers post-volley.", color: "var(--flex)" },
                { name: "Grand Pectoral", detail: "Avant-bras contre porte. Ouvre la cage thoracique.", routine: "1 min / côté.", note: "Posture anti-bureau.", color: "var(--flex)" }
            ],
            jump: [
                { name: "Squat Goblet Flash", detail: "Poids contre cœur. Descente 3s, montée 0.5s.", routine: "4 séries de 10 reps.", note: "Vise l'explosion maximale.", color: "var(--jump)" },
                { name: "Fentes Bulgares", detail: "Pied arrière surélevé. Focus sur la propulsion.", routine: "3 séries de 8 reps / jambe.", note: "Force unilatérale cruciale.", color: "var(--jump)" },
                { name: "La Chaise (Isométrie)", detail: "Dos au mur, angle 90°. Bloque tout.", routine: "3 séries de 45s.", note: "À faire avant CHAQUE match.", color: "var(--jump)" },
                { name: "Extensions Mollets", detail: "Sur une jambe avec poids. Monte au max.", routine: "4 séries de 15 reps.", note: "L'effet ressort final.", color: "var(--jump)" }
            ]
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            const container = document.getElementById('content');
            const notice = notices[tabId];
            
            let html = `
                <div class="notice-box mb-6 space-y-2">
                    <p class="text-[9px] text-green-400 font-bold uppercase tracking-tighter">✅ Quand : <span class="text-white italic lowercase font-normal">${notice.when}</span></p>
                    <p class="text-[9px] text-red-400 font-bold uppercase tracking-tighter">❌ Éviter : <span class="text-white italic lowercase font-normal">${notice.avoid}</span></p>
                </div>
            `;

            html += exercises[tabId].map((ex, i) => `
                <div onclick="openEx('${tabId}', ${i})" class="exercise-card p-5 mb-3 flex justify-between items-center group">
                    <span class="font-black text-xs uppercase tracking-tight" style="color: ${ex.color}">${ex.name}</span>
                    <div class="w-7 h-7 rounded-full bg-white/5 flex items-center justify-center text-[10px] opacity-30">→</div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        function openEx(tab, index) {
            const ex = exercises[tab][index];
            document.getElementById('modal-body').innerHTML = `
                <h2 class="text-xl font-black uppercase italic mb-1" style="color: ${ex.color}">${ex.name}</h2>
                <div class="w-10 h-1 mb-4" style="background-color: ${ex.color}"></div>
                <p class="text-gray-400 text-[11px] leading-relaxed mb-6">${ex.detail}</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[8px] font-black text-gray-500 uppercase mb-1">Objectif</p>
                        <p class="text-[11px] font-bold">${ex.routine}</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[8px] font-black text-gray-500 uppercase mb-1">Note Coach</p>
                        <p class="text-[11px] font-bold italic">${ex.note}</p>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
            setTimeout(() => document.body.classList.add('modal-open'), 10);
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 400);
        }

        switchTab('climb');
    </script>
</body>
</html>
