<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Library 7a</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #000000; --card: #1C1C1E; --accent-climb: #BF5AF2; --accent-flex: #FFFFFF; --accent-jump: #0A84FF; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-bottom: 2px solid transparent; opacity: 0.4; }
        .tab-btn.active { opacity: 1; border-color: currentColor; transform: scale(1.05); }

        .exercise-card { background: var(--card); border: 0.5px solid #2C2C2E; border-radius: 16px; transition: transform 0.2s active; }
        .exercise-card:active { transform: scale(0.96); background: #2C2C2E; }

        /* Animation d'ouverture */
        #modal { backdrop-filter: blur(20px); transition: all 0.4s ease-in-out; }
        .modal-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-open .modal-content { transform: translateY(0); }
        
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="overflow-hidden">

    <header class="p-6 pb-2 sticky top-0 bg-black/80 backdrop-blur-md z-40">
        <h1 class="text-2xl font-black uppercase tracking-tighter italic mb-4">Library <span class="text-blue-500">Proj 7a</span></h1>
        <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
            <button onclick="switchTab('climb')" id="tab-climb" class="tab-btn active text-purple-400">Escalade</button>
            <button onclick="switchTab('flex')" id="tab-flex" class="tab-btn text-white">Souplesse</button>
            <button onclick="switchTab('jump')" id="tab-jump" class="tab-btn text-blue-500">Détente</button>
        </div>
    </header>

    <main id="content" class="px-5 pt-4 h-[calc(100vh-140px)] overflow-y-auto pb-20">
        </main>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-end">
        <div onclick="closeModal()" class="absolute inset-0 bg-black/60"></div>
        <div class="modal-content w-full bg-[#1C1C1E] rounded-t-[32px] p-8 border-t border-white/10 safe-bottom">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6"></div>
            <div id="modal-body">
                </div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold uppercase text-xs tracking-widest">Fermer</button>
        </div>
    </div>

    <script>
        const exercises = {
            climb: [
                { name: "Mini Crux (No-Hang)", detail: "Tirage à une main sur réglette 20mm. Dos bien droit, épaule engagée.", routine: "5 séries de 7s (90% effort) / main. Repos 2'30.", note: "Le meilleur pour le 7a/b.", color: "purple" },
                { name: "Hangboard (Échauffement)", detail: "Suspensions bras tendus sur grosses prises puis réglettes.", routine: "3-5 suspensions de 10s. Repos 1'.", note: "À faire en début de séance.", color: "purple" },
                { name: "Hangboard (Fin de séance)", detail: "Travail de rési terminale sur 20mm.", routine: "6 séries de 7s. Repos 2'.", note: "Pour finir d'exploser les fibres.", color: "purple" },
                { name: "Tractions Lestées", detail: "Mouvement lent et contrôlé. Menton au-dessus de la barre.", routine: "4 séries de 5 reps.", note: "Utilise ton disque de 10kg.", color: "purple" }
            ],
            flex: [
                { name: "Le Couch Stretch", detail: "Genou au sol contre un mur, pied arrière relevé. Buste droit.", routine: "2 min par jambe.", note: "Indispensable pour soulager tes genoux.", color: "white" },
                { name: "La Grenouille", detail: "Genoux au sol écartés max, pieds vers l'extérieur.", routine: "2 à 3 minutes.", note: "Ouverture de hanche pour les pieds hauts.", color: "white" },
                { name: "Le Pigeon", detail: "Une jambe pliée devant, l'autre tendue derrière.", routine: "2 min par jambe.", note: "Libère les tensions du volley.", color: "white" },
                { name: "Grand Pectoral", detail: "Bras contre cadre de porte, pivote le buste.", routine: "1 min par côté.", note: "Contre la posture voûtée du grimpeur.", color: "white" }
            ],
            jump: [
                { name: "Squat Goblet Explosif", detail: "Disque 10kg contre la poitrine. Descente lente, montée flash.", routine: "4 séries de 10 reps.", note: "Ne décolle pas les pieds (bruit voisins).", color: "blue" },
                { name: "Fentes Bulgares", detail: "Un pied sur chaise derrière toi. Descente profonde.", routine: "3 séries de 8 reps / jambe.", note: "Moteur n'1 de la détente.", color: "blue" },
                { name: "Single-Leg RDL", detail: "Bascule buste en avant sur une jambe. Dos plat.", routine: "3 séries de 12 reps / jambe.", note: "Travaille la chaîne postérieure.", color: "blue" },
                { name: "La Chaise (Wall Sit)", detail: "Dos au mur, jambes à 90°. Isométrie pure.", routine: "3 séries de 45s.", note: "L'anti-douleur pour tes genoux.", color: "blue" }
            ]
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            const container = document.getElementById('content');
            container.innerHTML = exercises[tabId].map((ex, i) => `
                <div onclick="openEx('${tabId}', ${i})" class="exercise-card p-5 mb-3 flex justify-between items-center group">
                    <span class="font-bold text-sm tracking-tight">${ex.name}</span>
                    <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-[10px] group-active:bg-white/10">→</div>
                </div>
            `).join('');
        }

        function openEx(tab, index) {
            const ex = exercises[tab][index];
            const colors = { purple: '#BF5AF2', white: '#FFFFFF', blue: '#0A84FF' };
            
            document.getElementById('modal-body').innerHTML = `
                <h2 class="text-2xl font-black uppercase italic mb-2" style="color: ${colors[ex.color]}">${ex.name}</h2>
                <p class="text-gray-400 text-sm leading-relaxed mb-6">${ex.detail}</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[9px] font-black text-gray-500 uppercase mb-1">Routine</p>
                        <p class="text-xs font-bold">${ex.routine}</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[9px] font-black text-gray-500 uppercase mb-1">Note Coach</p>
                        <p class="text-xs font-bold italic">${ex.note}</p>
                    </div>
                </div>
            `;
            
            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            setTimeout(() => document.body.classList.add('modal-open'), 10);
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 400);
        }

        // Initialisation
        switchTab('climb');
    </script>
</body>
</html>
